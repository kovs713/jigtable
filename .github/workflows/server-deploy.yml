name: Server Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag. Defaults to commit SHA.
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        working-directory: server
        run: bun run typecheck

      - name: Test shuffle
        working-directory: server
        run: bun run test:shuffle

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image
        id: image
        shell: bash
        run: |
          repository="${GITHUB_REPOSITORY,,}"
          tag="${{ inputs.image_tag }}"
          if [ -z "$tag" ]; then
            tag="$GITHUB_SHA"
          fi
          echo "image=ghcr.io/${repository}/server:${tag}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image.outputs.image }}

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Trust VPS host
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload compose config
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh "$VPS_USER@$VPS_HOST" 'mkdir -p /opt/jigtable/backups'
          scp ops/docker-compose.prod.yml ops/Caddyfile "$VPS_USER@$VPS_HOST:/opt/jigtable/"

      - name: Login GHCR on VPS
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          printf '%s' "$GHCR_TOKEN" | ssh "$VPS_USER@$VPS_HOST" "docker login ghcr.io -u '$GHCR_USER' --password-stdin"

      - name: Deploy on VPS
        env:
          SERVER_IMAGE: ${{ steps.image.outputs.image }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh "$VPS_USER@$VPS_HOST" "SERVER_IMAGE='$SERVER_IMAGE' bash -s" <<'DEPLOY'
          set -euo pipefail

          cd /opt/jigtable

          docker compose -f docker-compose.prod.yml up -d postgres
          docker compose -f docker-compose.prod.yml exec -T postgres sh -lc 'pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"'

          backup="backups/pre-deploy-$(date +%Y%m%d%H%M%S).sql.gz"
          docker compose -f docker-compose.prod.yml exec -T postgres sh -lc 'pg_dump -U "$POSTGRES_USER" "$POSTGRES_DB"' | gzip > "$backup"

          docker compose -f docker-compose.prod.yml pull server
          docker compose -f docker-compose.prod.yml up -d
          docker compose -f docker-compose.prod.yml ps
          DEPLOY

      - name: Healthcheck
        run: curl --fail --retry 12 --retry-delay 5 --retry-connrefused https://api.jigtable.ru/api/health
