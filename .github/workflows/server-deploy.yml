name: Server Deploy

on:
  push:
    branches: [master]
    paths:
      - "server/**"
      - "packages/**"
      - ".github/workflows/server-deploy.yml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag override.
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: server-deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        working-directory: server
        run: bun run typecheck

      - name: Test shuffle
        working-directory: server
        run: bun run test:shuffle

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image
        id: image
        shell: bash
        env:
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          repository="${GITHUB_REPOSITORY,,}"
          tag="$GITHUB_SHA"

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_IMAGE_TAG" ]; then
            tag="$INPUT_IMAGE_TAG"
          fi

          image="ghcr.io/${repository}/server:${tag}"

          {
            echo "image=${image}"
            echo "tags<<EOF"
            echo "${image}"
            if [ "$GITHUB_REF_NAME" = "master" ]; then
              echo "ghcr.io/${repository}/server:master"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image.outputs.tags }}

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Trust VPS host
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload compose config
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh "$VPS_USER@$VPS_HOST" 'mkdir -p /opt/jigtable/backups'
          scp ops/docker-compose.prod.yml ops/Caddyfile "$VPS_USER@$VPS_HOST:/opt/jigtable/"

      - name: Login GHCR on VPS
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          printf '%s' "$GHCR_TOKEN" | ssh "$VPS_USER@$VPS_HOST" "docker login ghcr.io -u '$GHCR_USER' --password-stdin"

      - name: Deploy on VPS
        env:
          SERVER_IMAGE: ${{ steps.image.outputs.image }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          remote_script="$(ssh "$VPS_USER@$VPS_HOST" 'mktemp /tmp/jigtable-server-deploy.XXXXXX.sh')"
          cleanup() {
            ssh "$VPS_USER@$VPS_HOST" "rm -f '$remote_script'" || true
          }
          trap cleanup EXIT

          ssh "$VPS_USER@$VPS_HOST" "cat > '$remote_script'" <<'DEPLOY'
          set -euo pipefail

          cd /opt/jigtable
          export SERVER_IMAGE

          exec 9>/tmp/jigtable-server-deploy.lock
          flock -n 9 || { echo "Deploy already running"; exit 1; }

          echo "Deploying $SERVER_IMAGE"

          docker compose -f docker-compose.prod.yml up -d postgres

          for attempt in $(seq 1 30); do
            if docker compose -f docker-compose.prod.yml exec -T postgres sh -lc 'pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"'; then
              break
            fi

            if [ "$attempt" -eq 30 ]; then
              docker compose -f docker-compose.prod.yml logs postgres
              exit 1
            fi

            sleep 2
          done

          echo "Backing up Postgres"
          backup="backups/pre-deploy-$(date +%Y%m%d%H%M%S).sql.gz"
          docker compose -f docker-compose.prod.yml exec -T postgres sh -lc 'pg_dump -U "$POSTGRES_USER" "$POSTGRES_DB"' | gzip > "$backup"

          echo "Pulling server image"
          docker compose -f docker-compose.prod.yml pull server
          docker compose -f docker-compose.prod.yml run --rm --no-deps server sh -lc "grep -q 'telegramApiFetch' /app/server/src/bot/index.ts && grep -q 'bot.start' /app/server/src/bot/index.ts"
          echo "Recreating server and caddy"
          docker compose -f docker-compose.prod.yml up -d --pull always --remove-orphans --force-recreate server caddy

          expected_image_id="$(docker image inspect "$SERVER_IMAGE" --format '{{.Id}}')"
          running_image_id="$(docker inspect --format '{{.Image}}' jigtable-server-1)"
          if [ "$running_image_id" != "$expected_image_id" ]; then
            echo "Server is not running deployed image"
            echo "expected: $SERVER_IMAGE $expected_image_id"
            echo "running: $running_image_id"
            exit 1
          fi

          for attempt in $(seq 1 20); do
            status="$(docker inspect --format '{{.State.Status}}' jigtable-caddy-1 2>/dev/null || true)"
            if [ "$status" = running ]; then
              break
            fi

            if [ "$attempt" -eq 20 ]; then
              docker compose -f docker-compose.prod.yml ps
              docker compose -f docker-compose.prod.yml logs --tail=200 caddy
              exit 1
            fi

            sleep 2
          done

          for attempt in $(seq 1 30); do
            status="$(docker inspect --format '{{.State.Health.Status}}' jigtable-server-1 2>/dev/null || true)"
            if [ "$status" = healthy ]; then
              break
            fi

            if [ "$attempt" -eq 30 ]; then
              docker compose -f docker-compose.prod.yml ps
              docker compose -f docker-compose.prod.yml logs --tail=200 xray server caddy
              exit 1
            fi

            sleep 3
          done

          for attempt in $(seq 1 20); do
            if curl -fsS --resolve api.jigtable.ru:443:127.0.0.1 https://api.jigtable.ru/api/health >/dev/null; then
              break
            fi

            if [ "$attempt" -eq 20 ]; then
              docker compose -f docker-compose.prod.yml ps
              docker compose -f docker-compose.prod.yml logs --tail=200 caddy server
              ss -lntp | grep -E ':80|:443' || true
              exit 1
            fi

            sleep 3
          done

          docker compose -f docker-compose.prod.yml ps
          DEPLOY

          ssh "$VPS_USER@$VPS_HOST" "SERVER_IMAGE='$SERVER_IMAGE' bash '$remote_script'"

      - name: Healthcheck
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          if curl --fail --retry 12 --retry-delay 5 --retry-connrefused https://api.jigtable.ru/api/health; then
            exit 0
          fi

          ssh "$VPS_USER@$VPS_HOST" 'cd /opt/jigtable && docker compose -f docker-compose.prod.yml ps && docker compose -f docker-compose.prod.yml logs --tail=200 xray server caddy && ss -lntp | grep -E '\'':80|:443'\'' || true'
          exit 1
