services:
  db:
    image: postgres:18-alpine
    container_name: jigtable-db

    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}

    ports:
      - ${DB_PORT}:5432

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 30s
      timeout: 20s
      retries: 3

    volumes:
      - db_data:/var/lib/postgresql

volumes:
  db_data:
